<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Almoxarifado — Controle de Estoque</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <span class="header-icon">👨🏽‍⚕️</span>
      <div>
        <h1 class="header-title">Almoxarifado de Enfermagem </h1>
        <p class="header-sub">Controle de Estoque · Enfermagem</p>
      </div>
    </div>
  </header>

  <main class="container">

    <section class="card form-card">
      <h2 class="section-title">Cadastrar Material</h2>
      <div class="form-row">
        <div class="field">
          <label for="input-nome">Nome do Material</label>
          <input type="text" id="input-nome" placeholder="Ex: Seringa 10ml" autocomplete="off" />
        </div>
        <div class="field field--small">
          <label for="input-quantidade">Quantidade</label>
          <input type="number" id="input-quantidade" placeholder="0" min="0" />
        </div>
        <div class="field field--btn">
          <button id="btn-cadastrar">Cadastrar</button>
        </div>
      </div>
      <p id="msg-feedback" class="msg-feedback"></p>
    </section>

    <section class="card list-card">
      <h2 class="section-title">Materiais em Estoque</h2>
      <div class="table-wrap">
        <table id="lista-materiais">
          <thead>
            <tr>
              <th>#</th>
              <th>Material</th>
              <th>Quantidade</th>
              <th>Retirar</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-materiais">
            <tr id="tr-loading">
              <td colspan="5" class="td-empty">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
